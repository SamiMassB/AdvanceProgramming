<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
</head>

<body style="text-align: center;">
  <button 
    onclick="goToPage()" 
    style="position: absolute; top: 10px; left: 10px; padding: 8px 16px; background-color: red; color: white; border: none; border-radius: 5px; cursor: pointer;">
    Back
  </button>

  <script>
    function goToPage() {
      window.location.href = "/home"; 
    }
  </script>
  <section style="background-color: lightblue; padding: 1%; max-width: 300px; border-radius: 3px; margin: auto; ">
    <h2>Add Join Event</h2>
    <form action="/home/add-join-event" method="post">

      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        Guests <span style="color: red;">*</span>
      </h5>
      <input name="Guests" type="text" placeholder="e.g. Ali, Mohammad" style="display: block; margin: auto; margin-bottom: 20px; padding: 8px; width: 94%;">
      
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        Date <span style="color: red;">*</span>
      </h5>
      <input name="Date" type="text" placeholder="YYYY/MM/DD" style="display: block; margin: auto; margin-bottom: 20px; padding: 8px; width: 94%;">
      
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        Start Time <span style="color: red;">*</span>
      </h5>
      <input name="Start_Time" type="text" placeholder="e.g. 9" style="display: block; margin: auto; margin-bottom: 20px; padding: 8px; width: 94%;">
      
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        End Time <span style="color: red;">*</span>
      </h5>
      <input name="End_Time" type="text" placeholder="e.g. 11" style="display: block; margin: auto; margin-bottom: 20px; padding: 8px; width: 94%;">
      
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        Title <span style="color: red;">*</span>
      </h5>
      <input name="Title" type="text" placeholder="Event Title" style="display: block; margin: auto; margin-bottom: 20px; padding: 8px; width: 94%;">
      
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        Description
      </h5>
      <input name="Description" type="text" placeholder="Event Details" style="display: block; margin: auto; margin-bottom: 20px; padding: 8px; width: 94%;">
        <input type="submit" style="display: block; width: 100%; padding: 7px;" value="Add">
    </form>
  </section>
</body>

</html>

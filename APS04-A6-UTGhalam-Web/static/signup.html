<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
</head>

<body style="text-align: center;">
  <button 
    onclick="goToPage()" 
    style="position: absolute; top: 10px; left: 10px; padding: 8px 16px; background-color: red; color: white; border: none; border-radius: 5px; cursor: pointer;">
    Back
  </button>

  <script>
    function goToPage() {
      window.location.href = "/"; // Replace with your desired page
    }
  </script>
  <h1>UTrello</h1>
  <section style="background-color: lightblue; padding: 1%; max-width: 300px; border-radius: 3px; margin: auto; ">
    <h2>Signup</h2>
    <form action="/signup" method="post">
      <input name="username" type="text" placeholder="Username" style="display: block; margin: auto; margin-bottom: 10px; padding: 5px; width: 94%;">
      <input name="password" type="password" placeholder="Password" style="display: block; margin: auto; margin-bottom: 30px; padding: 5px; width: 94%;">
      <input type="submit" style="display: block; width: 100%; padding: 7px;" value="Login">
    </form>
  </section>
</body>

</html>

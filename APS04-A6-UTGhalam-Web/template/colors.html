<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Options Page</title>
</head>

<body style="text-align: center;">
  <button 
    onclick="goToPage()" 
    style="position: absolute; top: 10px; left: 10px; padding: 8px 16px; background-color: red; color: white; border: none; border-radius: 5px; cursor: pointer;">
    Back
  </button>

  <script>
    function goToPage() {
      window.location.href = "/home"; // Replace with your desired page
    }
  </script>
  
  <section style="background-color: lightblue; padding: 1%; max-width: 300px; border-radius: 3px; margin: auto; margin-top: 50px;">
    <h2>Options Selection</h2>
    <form action="/process-options" method="post">
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        From <span style="color: red;">*</span>
      </h5>
      <input name="From" type="text" placeholder="Enter starting point" style="display: block; margin: auto; margin-bottom: 10px; padding: 5px; width: 94%;">
      
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        To <span style="color: red;">*</span>
      </h5>
      <input name="To" type="text" placeholder="Enter destination" style="display: block; margin: auto; margin-bottom: 10px; padding: 5px; width: 94%;">
      
      <h5 style="text-align: left; margin-left: 3%; margin-bottom: 5px;">
        Type <span style="color: red;">*</span>
      </h5>
      <select name="Type" style="display: block; margin: auto; margin-bottom: 10px; padding: 5px; width: 97%;">
        <option value="" disabled selected>Select an option</option>
        <option value="Option1">Option 1</option>
        <option value="Option2">Option 2</option>
        <option value="Option3">Option 3</option>
        <option value="Option4">Option 4</option>
      </select>
      
      <input type="submit" style="display: block; width: 100%; padding: 7px;" value="Submit">
    </form>
  </section>
</body>

</html>
